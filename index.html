<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختيار الصفحة</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 30px 20px 60px;
            background: linear-gradient(135deg, #f6f8ff 0%, #e8f0ff 45%, #d8e4ff 100%);
            color: #1f2a44;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            margin-top: 0;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 15px 30px rgba(57, 85, 142, 0.2);
            padding: 30px 25px;
            width: min(520px, 90vw);
        }
        h1 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 2rem;
            color: #1d3162;
        }
        p { margin: 0 0 24px; font-size: 1rem; color: #4f5f84; }
        button {
            margin: 8px;
            padding: 14px 22px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            transition: transform 0.17s ease, box-shadow 0.17s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(36, 73, 150, 0.2);
        }
        button:active {
            transform: translateY(0px);
            box-shadow: 0 5px 10px rgba(36, 73, 150, 0.19);
        }
        .btn-pc { background: #3f60ff; color: #fff; }
        .btn-phone { background: #16abff; color: #fff; }
    </style>
</head>
<body>
    <div class="container">
    <h1>اختر الصفحة</h1>
    <p>اضغط على أي زر للانتقال إلى الملف في المجلد المقابل:</p>
    <button class="btn-pc" onclick="window.location.href='pc/flip-book/ae26680826.html'">الانتقال إلى صفحة PC</button>
    <button class="btn-phone" onclick="window.location.href='phone/flip-book/ae26680826.html'">الانتقال إلى صفحة Phone</button>
    </div>
</body>
</html>
